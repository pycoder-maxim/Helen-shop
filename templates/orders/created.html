{% extends 'base.html' %}

{% block title %}Заказ оформлен{% endblock %}

{% block content %}
<div class="container text-center py-5">
    <div class="mb-4">
        <i class="fas fa-check-circle text-success fa-5x"></i>
    </div>
    <h1 class="mb-3">Спасибо за заказ!</h1>
    <p class="lead">Ваш заказ №{{ order.id }} успешно оформлен.</p>
    <p>На указанный email мы отправили подтверждение заказа.</p>
    <div class="mt-4">
        <a href="{% url 'shop:product_list' %}" class="btn btn-primary">Продолжить покупки</a>
        <a href="{% url 'orders:order_list' %}" class="btn btn-outline-secondary">Мои заказы</a>
    </div>
</div>
{% endblock %}
